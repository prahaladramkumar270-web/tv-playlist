<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Personal Cinema</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="sidebar">
    <h2>📽️ My Library</h2>
    <div id="playlist-container">Loading Library...</div>
</div>

<div id="main">
    <div class="video-container">
        <video id="player" playsinline controls></video>
    </div>
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
<script>
    const API_KEY = 'AIzaSyCUS3WY55emdoxiDlAx9rbIClMWpkBxsIM';
    const player = new Plyr('#player');

    // FUNCTION TO EXTRACT ID FROM URL AUTOMATICALLY
    function extractId(input) {
        // If it's already a clean ID (no slashes), just return it
        if (!input.includes('/')) return input;
        
        // Regex to find the ID between /d/ and the next slash
        const regex = /\/d\/([a-zA-Z0-9_-]{25,})/;
        const match = input.match(regex);
        return match ? match[1] : input;
    }

    fetch('playlist.json')
        .then(res => res.json())
        .then(data => {
            const container = document.getElementById('playlist-container');
            container.innerHTML = '';
            data.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item';
                div.tabIndex = 0; // Makes it focusable for TV remotes
                div.innerText = item.title;
                
                // When clicked, extract the ID from the link and play
                div.onclick = () => {
                    const cleanId = extractId(item.id);
                    playVideo(cleanId, item.subs);
                };
                
                // Remote control "Enter" key support
                div.onkeydown = (e) => { if(e.key === "Enter") div.onclick(); };
                
                container.appendChild(div);
            });
        });

    function playVideo(fileId, subsPath) {
        const videoSrc = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&key=${API_KEY}`;
        player.source = {
            type: 'video',
            sources: [{ src: videoSrc, type: 'video/mp4' }],
            tracks: [{ kind: 'captions', label: 'English', srclang: 'en', src: subsPath, default: true }]
        };
        player.play();
    }
</script>
</body>
</html>
